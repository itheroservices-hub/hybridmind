name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      NODE_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Security audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Build extension (VSIX)
        run: |
          mkdir -p dist
          cd hybridmind-extension
          npm ci
          npx vsce package --out ../dist/hybridmind-extension.vsix || echo "VSIX packaging requires vsce — skipping in CI"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hybridmind-extension.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: echo "Release created for ${{ github.ref_name }}"
